<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PersiaNexus NFT Hub</title>


<style>

*{
box-sizing:border-box;
}

body{

margin:0;
background:#050505;
color:white;
font-family:tahoma,Arial;

}


.hero{

min-height:70vh;

background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.95)
),
url("assets/images/nft/persian-legends-cover.jpg");

background-size:cover;
background-position:center;

display:flex;
align-items:center;
justify-content:center;

text-align:center;

}


.hero h1{

font-size:55px;
color:#ffd700;

}


.hero p{

font-size:22px;

}



.container{

padding:50px;

}



.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(260px,1fr));

gap:30px;

}



.card{

background:#111;

border-radius:25px;

overflow:hidden;

cursor:pointer;

transition:.3s;

border:1px solid #222;

}


.card:hover{

transform:translateY(-12px);

border-color:#ffd700;

}



.card img{

width:100%;

height:320px;

object-fit:cover;

}



.info{

padding:25px;

}



.name{

font-size:28px;

}



.gold{

color:#ffd700;

}



.rarity{

background:#222;

display:inline-block;

padding:8px 15px;

border-radius:20px;

margin-top:10px;

}


.loading{

text-align:center;

font-size:25px;

padding:50px;

}


</style>

</head>


<body>



<section class="hero">

<div>

<h1>
PersiaNexus Legends
</h1>

<p>
دروازه ورود به دنیای NFT قهرمانان افسانه‌ای
</p>


</div>

</section>



<section class="container">


<h2>
قهرمانان NFT
</h2>


<div id="heroes" class="cards">

<div class="loading">
در حال بارگذاری...
</div>


</div>


</section>




<script src="js/data-loader.js"></script>



<script>


async function loadNFT(){


const data =
await PersiaNexusData.load("heroes.json");



const box =
document.getElementById("heroes");



box.innerHTML="";



if(!data || !data.heroes){

box.innerHTML=
"اطلاعات قهرمان‌ها پیدا نشد";

return;

}




data.heroes.forEach(hero=>{


box.innerHTML += `


<div class="card"
onclick="openHero('${hero.id}')">


<img src="${hero.thumbnail}">



<div class="info">


<div class="name">

${hero.name}

</div>



<p>

${hero.title}

</p>



<div class="rarity gold">

${hero.nft.rarity}

</div>



</div>


</div>


`;


});


}




function openHero(id){

window.location.href =
`nft-detail.html?id=${id}`;

}



loadNFT();



</script>


</body>

</html>
